# =============================================================
# Docker Compose — Nexo Mídia (versão simples)
#
# Sobe só o essencial: app + PostgreSQL. Sem Redis, sem Nginx —
# o rate limiting funciona em memória (ok para 1 worker/container)
# e você expõe a porta 8000 direto ou coloca o Nginx do HOST na frente.
#
# Uso:
#   cp .env.example .env   # edite SECRET_KEY, POSTGRES_PASSWORD, COMPANY_WHATSAPP...
#   docker compose -f deploy/docker/docker-compose.yml --env-file .env up -d --build
#   docker compose -f deploy/docker/docker-compose.yml exec web flask create-admin
#
# Precisa de mais performance com múltiplos workers? Descomente o
# serviço "redis" abaixo e defina RATELIMIT_STORAGE_URI=redis://redis:6379/0.
# Quer HTTPS automático? Veja deploy/nginx.conf + certbot (guia no README).
# =============================================================
name: midia-indoor

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-nexo_midia}
      POSTGRES_USER: ${POSTGRES_USER:-nexo_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?defina POSTGRES_PASSWORD no .env}
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-nexo_user}"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build:
      context: ../../
      dockerfile: deploy/docker/Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      FLASK_ENV: production
      DATABASE_URL: postgresql+psycopg2://${POSTGRES_USER:-nexo_user}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-nexo_midia}
      RATELIMIT_STORAGE_URI: memory://
      GUNICORN_WORKERS: ${GUNICORN_WORKERS:-2}
      BEHIND_PROXY: "1"
      SECRET_KEY: ${SECRET_KEY:?defina SECRET_KEY no .env}
      SECURITY_PASSWORD_SALT: ${SECURITY_PASSWORD_SALT:?defina SECURITY_PASSWORD_SALT no .env}
      COMPANY_NAME: ${COMPANY_NAME:-Nexo Mídia}
      COMPANY_WHATSAPP: ${COMPANY_WHATSAPP:-5567999990000}
      COMPANY_EMAIL: ${COMPANY_EMAIL:-}
      COMPANY_PHONE: ${COMPANY_PHONE:-}
      COMPANY_ADDRESS: ${COMPANY_ADDRESS:-}
      FORCE_HTTPS: ${FORCE_HTTPS:-0}
      LOG_TO_STDOUT: "1"
    volumes:
      - uploads_data:/app/app/static/uploads
      - logs_data:/app/logs
    ports:
      - "${APP_PORT:-8000}:8000"

  # ---- Opcional: descomente se for rodar com mais de 1 worker/container
  # e quiser rate limiting consistente entre eles.
  # redis:
  #   image: redis:7-alpine
  #   restart: unless-stopped
  #   command: ["redis-server", "--save", "", "--appendonly", "no"]

volumes:
  db_data:
  uploads_data:
  logs_data:
