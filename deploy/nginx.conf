# =============================================================
# Nginx — reverse proxy para o Nexo Mídia (Flask + Gunicorn)
# Coloque em /etc/nginx/sites-available/midia-indoor
# e crie um link simbólico em /etc/nginx/sites-enabled/
# =============================================================

# Redireciona todo tráfego HTTP para HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name midiaindoor.com.br www.midiaindoor.com.br;

    # Necessário para renovação do Certbot/Let's Encrypt
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name midiaindoor.com.br www.midiaindoor.com.br;

    # ---- Certificados (gerados via certbot --nginx) ----
    ssl_certificate     /etc/letsencrypt/live/midiaindoor.com.br/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/midiaindoor.com.br/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # ---- Cabeçalhos de segurança adicionais (defesa em profundidade,
    # complementando o Flask-Talisman) ----
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    client_max_body_size 80M;   # alinhado ao MAX_CONTENT_LENGTH_MB da aplicação
    keepalive_timeout 15;

    access_log /var/log/nginx/midia-indoor.access.log;
    error_log  /var/log/nginx/midia-indoor.error.log;

    # ---- Arquivos estáticos servidos diretamente pelo Nginx ----
    # (mais rápido que passar pelo Gunicorn/Python)
    location /static/ {
        alias /opt/midia-indoor/app/static/;
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ---- Aplicação Flask via Gunicorn (socket TCP local) ----
    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
        proxy_redirect off;
        proxy_connect_timeout 30s;
        proxy_read_timeout 30s;
    }

    # Health check (não loga, usado por monitoramento)
    location = /healthz {
        proxy_pass http://127.0.0.1:8000/healthz;
        access_log off;
    }
}
